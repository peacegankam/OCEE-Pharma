{% extends "base.html" %}

{% block title %}Personnel — OCEE PHARMA{% endblock %}
{% block page_title %}Gestion du Personnel{% endblock %}

{% block content %}
<div class="page-layout">
    <!-- ── FORMULAIRE NOUVEL EMPLOYÉ ── -->
    <div class="sidebar-form">
        <div class="card">
            <div class="card-header">
                <span class="card-title">👤 Ajouter un Compte</span>
            </div>
            <div class="card-body">
                <form id="form-employe">
                    <div class="form-group">
                        <label>Nom complet</label>
                        <input type="text" id="emp-nom" name="nom" required placeholder="ex: Jean Dupont" />
                    </div>
                    <div class="form-group">
                        <label>Rôle</label>
                        <select id="emp-role" name="role">
                            <option value="vendeur">Vendeur</option>
                            <option value="admin">Administrateur</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:none;">
                        <label>Mot de passe / PIN</label>
                        <input type="password" id="emp-pin" name="code_pin" placeholder="Optionnel" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        Créer le Compte
                    </button>
                </form>
            </div>
        </div>

    </div>


    <!-- ── LISTE DES UTILISATEURS ── -->
    <div class="main-panel">
        <div class="card">
            <div class="card-header">
                <span class="card-title">👥 Comptes Utilisateurs</span>
            </div>
            <div class="card-body p0" id="table-employes-container">
                <table class="data-table" id="table-employes">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Rôle</th>
                            <th>Ventes</th>
                            <th>C.A. Généré</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rendu par JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Les données sont injectées depuis Jinja
    const employesData = {{ utilisateurs | tojson | safe }};

    document.addEventListener('DOMContentLoaded', () => {
        setupPagination('table-employes-container', employesData, function(pageData) {
            const tbody = document.querySelector('#table-employes tbody');
            tbody.innerHTML = pageData.map(user => `
                <tr>
                    <td class="bold">${user.nom}</td>
                    <td>
                        <span class="badge ${user.role === 'admin' ? 'badge-sabc' : 'badge-guinness'}">
                            ${user.role.toUpperCase()}
                        </span>
                    </td>
                    <td>${user.nb_ventes || 0}</td>
                    <td class="bold text-green">${formaterFCFA(user.total_vendu || 0)}</td>
                    <td>
                        <button class="btn btn-ghost btn-sm text-red btn-delete-user" data-id="${user.id}" data-nom="${user.nom}">
                            🗑️
                        </button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="table-empty">Aucun employé trouvé</td></tr>';
        }, 10);
    });

    document.getElementById('form-employe').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            nom: document.getElementById('emp-nom').value,
            role: document.getElementById('emp-role').value,
            code_pin: ''
        };

        fetch('/admin/api/employes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                showSuccessModal('Création réussie', 'Compte créé avec succès', () => {
                    location.reload();
                });
            } else {
                afficherNotif(res.message, 'error');
            }
        });
    });

    // Gestion de la suppression via delegation
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.btn-delete-user');
        if (!btn) return;
        
        const id = btn.dataset.id;
        const nom = btn.dataset.nom;
        
        showConfirmModal('Suppression', `Voulez-vous vraiment supprimer le compte de ${nom} ?`, () => {
            fetch(`/admin/api/employes/${id}`, { method: 'DELETE' })
            .then(r => {
                if (!r.ok) {
                    throw new Error("Erreur serveur " + r.status);
                }
                return r.json();
            })
            .then(res => {
                if (res.success) {
                    showSuccessModal('Compte supprimé', 'Le compte a été supprimé avec succès.', () => {
                        location.reload();
                    });
                } else {
                    afficherNotif("Échec : " + res.message, 'error');
                }
            })
            .catch(err => {
                afficherNotif("Erreur de connexion : " + err.message, 'error');
            });
        });
    });
</script>
{% endblock %}
